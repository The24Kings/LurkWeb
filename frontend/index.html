<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lurk Web Client</title>

    <!-- React 18 via CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel standalone for JSX transformation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="root"></div>

    <!-- Utilities (plain JS, no JSX — runs synchronously before Babel scripts) -->
    <script src="utils.js"></script>

    <!-- Components (Babel-transformed, executed in document order) -->
    <script type="text/babel" src="components/ContextMenu.jsx"></script>
    <script type="text/babel" src="components/EntityCard.jsx"></script>
    <script type="text/babel" src="components/CharacterModal.jsx"></script>
    <script type="text/babel" src="components/ConnectScreen.jsx"></script>
    <script type="text/babel" src="components/GameView.jsx"></script>
    <script type="text/babel" src="App.jsx"></script>
</body>

</html>
